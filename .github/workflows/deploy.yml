name: Despliegue Final GastoMaster

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos versiones específicas que sabemos que no chocan
          pip install flet==0.27.3 supabase==2.11.0
          # Si tienes el requirements.txt con esas mismas versiones, lo instalamos
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🏗️ Construir Web (Modo Super-Forzado)
        run: |
          # 1. Instalación base para el compilador
          pip install flet==0.27.3 supabase==2.11.0
          
          # 2. Intentar el build normal primero
          flet build web --base-url /mi_lista_compras/
          
          # 3. MANIOBRA DE RECONSTRUCCIÓN TOTAL:
          # Si Flet no creó la carpeta o está vacía, instalamos TODO ahí dentro
          echo "🔧 Asegurando librerías en el paquete del navegador..."
          mkdir -p build/web/assets/python
          
          # Instalamos flet y supabase directamente en el destino
          pip install flet==0.27.3 supabase==2.11.0 -t build/web/assets/python
          
          # 4. LIMPIEZA CRÍTICA:
          # Flet en la web a veces choca con archivos .pyc o carpetas bin
          rm -rf build/web/assets/python/bin
          find build/web/assets/python -name "__pycache__" -type d -exec rm -rf {} +
          
          # 5. VERIFICACIÓN:
          echo "🔍 Verificando presencia de Flet en assets:"
          ls build/web/assets/python/flet || echo "❌ FLET NO ENCONTRADO"
          
      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true
