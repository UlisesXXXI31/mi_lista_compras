name: Despliegue de Mi Lista de Compras
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Cambiamos a 3.11 por estabilidad en el servidor

      - name: 🚀 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 🛠️ Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 📦 Instalar Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.25.0

      - name: 🏗️ Construir Web
        run: |
          # TRUCO MAESTRO: Forzamos el idioma y evitamos que Flet use la función 'unicode' rota
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export PYTHONIOENCODING=utf-8
          flet build web --base-url /mi_lista_compras/

      - name: 🚀 Publicar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
