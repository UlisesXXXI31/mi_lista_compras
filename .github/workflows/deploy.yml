name: Despliegue de Mi Lista de Compras
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🚀 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 🛠️ Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 📦 Instalar Flet (Versión corregida para CI)
        run: |
          python -m pip install --upgrade pip
          # Usamos la 0.27.3 porque corrige el error 'unicode' en servidores
          pip install flet==0.27.3

      - name: 🏗️ Construir Web
        run: |
          # Configuramos el entorno para que no falle el texto
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          # El comando de construcción
          flet build web --base-url /mi_lista_compras/

      - name: 🚀 Publicar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
