name: Despliegue de Mi Lista de Compras
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    # CAMBIO CRÍTICO: Usamos Ubuntu 22.04 por estabilidad
    runs-on: ubuntu-22.04 
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Versión estable para servidores

      - name: 🚀 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 🛠️ Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 📦 Instalar Flet y parches
        run: |
          python -m pip install --upgrade pip
          # Instalamos una versión de la librería de dibujo que no tiene el bug 'unicode'
          pip install "rich<13.0.0" 
          pip install flet==0.25.0

      - name: 🏗️ Construir Web
        run: |
          # Desactivamos colores y emojis que causan el error
          export NO_COLOR=1
          export PYTHONIOENCODING=utf-8
          flet build web --base-url /mi_lista_compras/

      - name: 🚀 Publicar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
