name: Despliegue Final GastoMaster

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos versiones específicas que sabemos que no chocan
          pip install flet==0.27.3 supabase==2.11.0
          # Si tienes el requirements.txt con esas mismas versiones, lo instalamos
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🏗️ Construir Web
        run: |
          pip install flet==0.27.3 supabase==2.11.0
          
          # 1. Aseguramos que los archivos están en la raíz
          # (A veces GitHub Actions los pone en subcarpetas según cómo hiciste el checkout)
          ls -la
          
          # 2. Ejecutamos el build apuntando explícitamente al directorio actual '.'
          # Esto obliga a Flet a mirar el requirements.txt que está ahí mismo
          flet build web . --base-url /mi_lista_compras/
          
          # 3. VERIFICACIÓN: Ahora debería existir
          echo "🔍 Comprobando si ahora sí se crearon los paquetes:"
          if [ -d "build/web/assets/python" ]; then
            echo "✅ Carpeta python encontrada. ¡Éxito!"
            ls build/web/assets/python
          else
            echo "❌ ERROR CRÍTICO: Flet sigue sin empaquetar las librerías."
            exit 1
          fi

      - name: 🛠️ Fix Service Worker Path
        run: |
          sed -i 's|flutter_service_worker.js|/mi_lista_compras/flutter_service_worker.js|g' build/web/index.html
          if [ -f build/web/manifest.json ]; then
            sed -i 's|"/|"/mi_lista_compras/|g' build/web/manifest.json
          fi
          
      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true
