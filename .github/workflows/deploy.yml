name: Despliegue Final GastoMaster

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos versiones específicas que sabemos que no chocan
          pip install flet==0.27.3 supabase==2.11.0
          # Si tienes el requirements.txt con esas mismas versiones, lo instalamos
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🏗️ Construir Web
        run: |
          pip install flet==0.27.3 supabase==2.11.0
          
          # Aseguramos que el archivo existe y está limpio
          cp requirements.txt requirements.txt.bak || true
          
          # Construcción limpia
          flet build web --base-url /mi_lista_compras/
          
          # Verificación de emergencia: ¿Se creó la carpeta de paquetes?
          echo "--- Verificando empaquetado de librerías ---"
          ls -R build/web/assets/python || echo "ALERTA: No se encontró la carpeta python en assets"

      - name: 🛠️ Fix Service Worker Path
        run: |
          sed -i 's|flutter_service_worker.js|/mi_lista_compras/flutter_service_worker.js|g' build/web/index.html
          if [ -f build/web/manifest.json ]; then
            sed -i 's|"/|"/mi_lista_compras/|g' build/web/manifest.json
          fi
          
      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true
