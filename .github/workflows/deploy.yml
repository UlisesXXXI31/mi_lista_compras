name: Despliegue de Mi Lista de Compras
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 🚀 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 🛠️ Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 📦 Instalar Flet
        run: |
          python -m pip install --upgrade pip
          # Usamos la 0.26.0, que es la más estable para despliegues web
          pip install flet==0.26.0

      - name: 🏗️ Construir Web
        run: |
          # 1. Forzamos el modo UTF-8 y terminal simple para evitar el error 'unicode'
          export PYTHONUTF8=1
          export TERM=xterm
          export NO_COLOR=1
          
          # 2. Ejecutamos el build diciéndole que use el Flutter que ya instalamos
          # Esto evita que intente descargar otro y falle
          flet build web --base-url /mi_lista_compras/

      - name: 🚀 Publicar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
