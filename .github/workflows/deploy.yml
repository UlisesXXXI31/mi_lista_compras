
name: Despliegue de Mi Lista de Compras
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 🚀 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # --- NUEVO PASO: Instalar librerías del sistema para que el robot no se queje ---
      - name: 🛠️ Instalar dependencias de Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: 📦 Instalar Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.25.0

      - name: 🏗️ Construir Web
        run: |
          # Usamos una variable de entorno para evitar errores de texto
          export PYTHONIOENCODING=utf8
          flet build web --base-url /mi_lista_compras/

      - name: 🚀 Publicar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
