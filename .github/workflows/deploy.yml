name: Despliegue Final GastoMaster

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          # Instalamos versiones específicas que sabemos que no chocan
          pip install flet==0.27.3 supabase==2.11.0
          # Si tienes el requirements.txt con esas mismas versiones, lo instalamos
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🏗️ Build and Force Python Assets
        run: |
          # 1. Instalamos flet para tener el comando
          pip install flet==0.27.3 supabase==2.11.0
          
          # 2. Ejecutamos el build oficial
          flet build web --base-url /mi_lista_compras/
          
          # 3. FORZADO MANUAL (Aquí está el truco):
          # Creamos la ruta completa si no existe
          mkdir -p build/web/assets/python
          
          # Instalamos las librerías directamente dentro de la carpeta que se va a publicar
          pip install flet==0.27.3 supabase==2.11.0 -t build/web/assets/python
          
          # 4. Verificación para el log (esto nos dirá si funcionó antes de subirlo)
          echo "Contenido de assets/python:"
          ls build/web/assets/python
          
      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true
