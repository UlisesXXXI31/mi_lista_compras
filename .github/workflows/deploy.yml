name: Despliegue Final GastoMaster
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.27.3
          # Si tienes un requirements.txt, descomenta la siguiente línea:
          # pip install -r requirements.txt 

      - name: 🏗️ Construir Web
        run: |
          # Flet build web genera la salida en build/web por defecto
          flet build web --base-url /mi_lista_compras/

      - name: 🛠️ Fix para GitHub Pages (Rutas Relativas)
        run: |
          # A veces el Service Worker necesita un empujón manual si el base-url falla
          cd build/web
          sed -i 's|<base href="/">|<base href="/mi_lista_compras/">|g' index.html

      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true # Mantiene el historial de la rama gh-pages limpio
