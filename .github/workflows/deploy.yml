name: Despliegue Final GastoMaster

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: 📦 Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.27.3 supabase
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🏗️ Construir Web
        run: |
          # Limpieza preventiva
          rm -rf build/web
          # Construcción con base-url para GitHub Pages
          flet build web --base-url /mi_lista_compras/

      - name: 🛠️ Fix Service Worker Path
        run: |
          # Corrección de la ruta del Service Worker en el index.html
          sed -i 's|flutter_service_worker.js|/mi_lista_compras/flutter_service_worker.js|g' build/web/index.html
          # Corrección opcional del manifest para asegurar iconos y recursos
          if [ -f build/web/manifest.json ]; then
            sed -i 's|"/|"/mi_lista_compras/|g' build/web/manifest.json
          fi

      - name: 🚀 Publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          single-commit: true
