name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Flet and Dependencies
        run: |
          pip install flet==0.27.3 supabase==2.11.0

      - name: 🏗️ Build Web
        run: |
          # Construimos la app
          flet build web --base-url /mi_lista_compras/
          
          # FORZAMOS la creación de la carpeta de librerías
          mkdir -p build/web/assets/python
          
          # Instalamos las librerías directamente en la carpeta que se subirá
          pip install flet==0.27.3 supabase==2.11.0 -t build/web/assets/python

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
